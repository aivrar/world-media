              <line x1="12" y1="2" x2="12" y2="12"/>

      </header>

      <main id="view-host" class="view-host">
        <div class="boot-state">

      <footer id="player-bar" class="player-bar" hidden>

          <img id="player-art" alt="" />
          <div class="player-text">
            <div id="player-title" class="player-title"></div>

          </div>
          <button id="player-fav" class="player-fav" type="button" title="Add to favorites" aria-label="Add to favorites" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>

        <div class="player-controls">

        </div>
        <div class="player-progress">
          <span id="player-time" class="player-time">--:--</span>
          <input id="player-seek" class="player-seek" type="range" min="0" max="100" value="0" disabled />
          <span id="player-dur" class="player-time">--:--</span>
        </div>
        <div class="player-volume">
          <button id="player-mute" class="player-btn" aria-label="Mute" title="Mute">

    <div id="modal-host"></div>
